name: Sync calendar

on:
  schedule:
    # America/Sao_Paulo (UTC-3, no DST): every 2h from 08:00–22:00 at minute 0
    #   BRT → 08  10  12  14  16  18  20  22
    #   UTC → 11  13  15  17  19  21  23  01
    - cron: "0 1,11,13,15,17,19,21,23 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-calendar
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Sync calendars
        env:
          AGENDA_ICAL_URLS_JSON_ARRAY: ${{ vars.AGENDA_ICAL_URLS_JSON_ARRAY }}
        run: pnpm sync:calendar
      - name: Promote calendar events to production
        run: |
          git fetch origin production
          if git diff --quiet origin/production -- src/content/events.generated.ts; then
            echo "No production calendar changes."
            exit 0
          fi
          cp src/content/events.generated.ts /tmp/events.generated.ts
          git stash push -m "calendar-sync" -- src/content/events.generated.ts
          git checkout production
          cp /tmp/events.generated.ts src/content/events.generated.ts
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/content/events.generated.ts
          git commit -m "chore(calendar): sync events [production]"
          git push origin production
          git checkout main
          git stash pop || cp /tmp/events.generated.ts src/content/events.generated.ts
      - name: Create PR if events changed
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore(calendar): sync events from Google Calendar [skip ci]"
          branch: bot/calendar-sync
          delete-branch: true
          title: "chore(calendar): sync events"
          body: |
            Automated calendar sync from Google Calendar iCal feeds.
            Production is updated in the same workflow run; this PR syncs main.
          labels: calendar-sync
      - name: Enable auto-merge
        if: steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --auto --merge "${{ steps.cpr.outputs.pull-request-number }}"
