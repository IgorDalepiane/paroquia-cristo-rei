name: Sync calendar

on:
  schedule:
    # America/Sao_Paulo (UTC-3, no DST): every 2h from 08:00–22:00 at minute 0
    #   BRT → 08  10  12  14  16  18  20  22
    #   UTC → 11  13  15  17  19  21  23  01
    - cron: "0 1,11,13,15,17,19,21,23 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - src/content/events.generated.ts

permissions:
  contents: write
  pull-requests: write
  actions: write

concurrency:
  group: sync-calendar
  cancel-in-progress: false

jobs:
  sync:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Sync calendars
        env:
          AGENDA_ICAL_URLS_JSON_ARRAY: ${{ vars.AGENDA_ICAL_URLS_JSON_ARRAY }}
        run: pnpm sync:calendar
      - name: Create PR if events changed
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore(calendar): sync events from Google Calendar [skip ci]"
          branch: bot/calendar-sync
          delete-branch: true
          title: "chore(calendar): sync events"
          body: |
            Automated calendar sync from Google Calendar iCal feeds.
            Merged automatically if CI passes.
          labels: calendar-sync
      - name: Enable auto-merge
        if: steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --auto --merge "${{ steps.cpr.outputs.pull-request-number }}"
      # Bot commits use [skip ci] (skips pull_request CI + Cloudflare). workflow_dispatch is not
      # affected by skip ci, so dispatch CI explicitly. Stuck PR recovery: gh workflow run ci.yml --ref bot/calendar-sync
      - name: Run CI on bot branch
        if: steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.cpr.outputs.pull-request-branch }}
        run: |
          ref="${BRANCH:-bot/calendar-sync}"
          gh workflow run ci.yml --ref "$ref"

  promote-production:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Promote calendar events to production
        run: |
          git fetch origin main production
          if git diff --quiet origin/production origin/main -- src/content/events.generated.ts; then
            echo "No production changes needed."
            exit 0
          fi
          git checkout production
          git checkout origin/main -- src/content/events.generated.ts
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/content/events.generated.ts
          git commit -m "chore(calendar): sync events [production]"
          git push origin production
